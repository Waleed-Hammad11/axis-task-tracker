<div class="page-background">
  <div class="tracker-container">
    <header class="tracker-header">
      <h1>The Axis Task Tracker</h1>
      <p>Organize your work, completely reactive.</p>
    </header>

    <div class="input-section">
      <input
        type="text"
        [(ngModel)]="newTaskTitle"
        (keyup.enter)="addTask()"
        placeholder="What do you need to get done?"
        class="task-input"
      />
      <button type="button" class="add-btn" (click)="addTask()">Add Task</button>
    </div>

    <ul class="task-list">
      @for (task of tasks; track task._id) {
        <li class="task-item" [class.completed-item]="task.completed">
          <label class="checkbox-container">
            <input
              type="checkbox"
              [checked]="task.completed"
              (change)="toggleTask(task)"
            />
            <span class="task-text">{{ task.title }}</span>
          </label>
          <button type="button" class="delete-btn" (click)="deleteTask(task._id)">Delete</button>
        </li>
      } @empty {
        <li class="empty-state">No tasks available. Add one above!</li>
      }
    </ul>
  </div>
</div>
